<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MoonShot Index Viewer</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font:13px 'Segoe UI',sans-serif; background:#1e1e1e; color:#d4d4d4;
       height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* toolbar */
#toolbar { background:#252526; border-bottom:1px solid #3e3e42; padding:6px 12px;
           display:flex; align-items:center; gap:10px; flex-shrink:0; }
#toolbar h1 { font-size:14px; color:#ccc; font-weight:600; margin-right:8px; }
.btn  { padding:4px 10px; border:1px solid #555; border-radius:3px; cursor:pointer;
        background:#3c3c3c; color:#ccc; font-size:12px; }
.btn:hover { background:#505050; }
#status { margin-left:auto; font-size:11px; color:#888; }
#srch   { padding:3px 8px; background:#3c3c3c; border:1px solid #555; color:#d4d4d4;
          border-radius:3px; width:180px; outline:none; font-size:12px; }

/* drop */
#drop { flex:1; display:flex; align-items:center; justify-content:center;
        flex-direction:column; gap:12px; border:2px dashed #555; margin:20px;
        border-radius:8px; cursor:pointer; }
#drop h2 { color:#888; }
#drop p  { color:#555; font-size:12px; }
#drop:hover { border-color:#007acc; }

/* main layout */
#main  { display:none; flex:1; overflow:hidden; }
#left  { width:min(480px,44%); flex-shrink:0; border-right:1px solid #3e3e42;
          display:flex; flex-direction:row; overflow:hidden; transition:width .2s; }
#left.collapsed { width:6px !important; }
#left.collapsed #left-inner { display:none; }
#left-inner { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
#hex-toggle { width:6px; flex-shrink:0; background:#3e3e42; border:none; cursor:col-resize;
               color:transparent; font-size:1px; border-left:1px solid #555;
               border-right:1px solid #555; transition:background .15s; }
#hex-toggle:hover { background:#007acc; }
#right { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* ── hex view: continuous full-file ── */
#hex-header { background:#2d2d30; padding:4px 10px; font-size:11px; color:#555;
              border-bottom:1px solid #3e3e42; flex-shrink:0;
              font-family:'Cascadia Code','Consolas',monospace; }
#hex-body   { flex:1; overflow-y:auto; padding:0 2px;
              font:11px/18px 'Cascadia Code','Consolas',monospace; }

.hrow  { display:flex; }
.haddr { color:#555; min-width:60px; padding-right:4px; -webkit-user-select:none; user-select:none; }
.hbytes { display:flex; flex-wrap:nowrap; }
.hb    { width:21px; text-align:right; padding-right:2px; cursor:pointer; border-radius:1px; }
.hb:hover { background:#3a3d41 !important; color:#fff !important; }
.gap   { width:8px; }   /* gap between byte 7 and byte 8 */
.hascii { padding-left:6px; color:#555; letter-spacing:0.5px; }

/* section colours (dim — show structure without distracting) */
.s-hdr  { color:#569cd6; }
.s-si   { color:#4ec9b0; }
.s-dd   { color:#ce9178; }
.s-b0   { color:#9a9a9a; }
.s-b1   { color:#888; }
.s-b2   { color:#aaa; }
.s-b3   { color:#969696; }

/* highlight: clicked / selected range */
.hb.hl   { background:#094771 !important; color:#fff !important; }
.hac.hl  { background:#094771; color:#fff; }

/* ── right pane ── */
#dec-tabs  { display:flex; background:#2d2d30; border-bottom:1px solid #3e3e42; flex-shrink:0; }
.dtab      { padding:5px 12px; cursor:pointer; font-size:12px; color:#888;
             border-right:1px solid #3e3e42; }
.dtab.active { color:#fff; background:#1e1e1e; border-bottom:2px solid #007acc; }
#dec-body  { flex:1; overflow:auto; }
.panel     { display:none; }
.panel.active { display:block; }

table { width:100%; border-collapse:collapse; }
th    { background:#252526; padding:4px 8px; text-align:left; color:#9cdcfe;
        font-size:11px; font-weight:600; position:sticky; top:0; z-index:1;
        border-bottom:1px solid #3e3e42; }
td    { padding:3px 8px; border-bottom:1px solid #2a2a2a; font-size:12px; }
tr:hover td { background:#2a2d2e; cursor:pointer; }
.mono { font-family:'Cascadia Code','Consolas',monospace; }
.num  { color:#b5cea8; }
.key  { color:#9cdcfe; }
.path { color:#ce9178; }
.badge      { display:inline-block; padding:1px 5px; border-radius:3px; font-size:10px; margin-left:4px; }
.badge-more { background:#ca5010; color:#fff; }
.badge-cont { background:#5c8a3a; color:#fff; }

.bcard     { border-bottom:1px solid #2a2a2a; }
.bcard-hdr { padding:5px 10px; background:#252526; display:flex; align-items:center;
             gap:6px; cursor:pointer; font-size:12px; }
.bcard-body { display:none; }
.bcard.open .bcard-body { display:block; }
.term-explorer { height:calc(100vh - 94px); overflow:auto; min-height:0; }
.term-toolbar { padding:5px 8px; font-size:11px; color:#888; background:#252526; border-bottom:1px solid #3e3e42; }
.icon-btn { width:18px; height:18px; padding:0; border:1px solid #555; border-radius:2px;
            background:#2d2d30; color:#ccc; cursor:pointer; font:12px 'Cascadia Code','Consolas',monospace; }
.icon-btn:hover { background:#094771; color:#fff; border-color:#007acc; }
.tree-row.active td { background:#094771; }
.tree-row .indent { display:inline-block; width:18px; }
.tree-kind { color:#888; font-size:11px; }
.term-jump { color:#9cdcfe; text-decoration:underline; cursor:pointer; }
.term-empty { padding:12px; color:#777; font-size:12px; }
.posting   { color:#4ec9b0; font-size:11px; padding:1px 4px; }
.sres      { padding:4px 8px; border-bottom:1px solid #2a2a2a; display:flex; gap:12px; align-items:baseline; }
.sres .score { color:#b5cea8; min-width:55px; font-size:11px; }
.sres .spath { color:#ce9178; cursor:pointer; text-decoration:underline; }
.sres .spath:hover { color:#f08030; }
#file-viewer { position:fixed; top:40px; right:20px; bottom:20px; width:50%;
                background:#1a1a1a; border:1px solid #555; border-radius:6px;
                display:none; flex-direction:column; z-index:100; box-shadow:0 4px 24px #000a; }
#file-viewer-hdr { background:#2d2d30; padding:6px 10px; display:flex;
                    align-items:center; gap:8px; border-radius:6px 6px 0 0; }
#file-viewer-title { flex:1; color:#9cdcfe; font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#file-viewer-close { background:none; border:none; color:#888; font-size:16px; cursor:pointer; padding:0 4px; }
#file-viewer-close:hover { color:#fff; }
#file-viewer-body { flex:1; overflow:auto; padding:8px;
                     font:12px/1.6 'Cascadia Code','Consolas',monospace; white-space:pre-wrap; color:#d4d4d4; }
.hidden  { display:none; }
.srch-hint { color:#888; padding:8px; }
</style>
</head>
<body>

<div id="toolbar">
  <h1>&#128269; MoonShot Viewer</h1>
  <input type="file" id="file-input" accept=".idx" class="hidden">
  <button type="button" class="btn" onclick="document.getElementById('file-input').click()">Open .idx</button>
  <input id="srch" placeholder="Filter terms / search…" oninput="onSearch(this.value)">
  <span id="status">Drop .idx or use ?idx=URL to load</span>
</div>

<div id="drop" onclick="document.getElementById('file-input').click()">
  <h2>&#128196; Drop .idx here</h2><p>or click to open</p>
</div>

<div id="main">
  <div id="left">
    <div id="left-inner">
      <div id="hex-header">
        Offset&nbsp;&nbsp;&nbsp;
        00&nbsp;01&nbsp;02&nbsp;03&nbsp;04&nbsp;05&nbsp;06&nbsp;07&nbsp;&nbsp;
        08&nbsp;09&nbsp;0A&nbsp;0B&nbsp;0C&nbsp;0D&nbsp;0E&nbsp;0F&nbsp;&nbsp;&nbsp;&nbsp;ASCII
      </div>
      <div id="hex-body"></div>
    </div>
    <button type="button" id="hex-toggle" title="Drag to resize · Click to collapse" onclick="void 0"></button>
  </div>
  <div id="right">
    <div id="dec-tabs">
      <div class="dtab active" data-p="hdr-panel"  onclick="switchTab(this)">File Header</div>
      <div class="dtab"        data-p="si-panel"   onclick="switchTab(this)">Term Directory</div>
      <div class="dtab"        data-p="dd-panel"   onclick="switchTab(this)">DocData</div>
      <div class="dtab"        data-p="blk-panel"  onclick="switchTab(this)">Posting Blocks</div>
      <div class="dtab"        data-p="srch-panel" onclick="switchTab(this)">Search</div>
    </div>
    <div id="dec-body">
      <div id="hdr-panel"  class="panel active"></div>
      <div id="si-panel"   class="panel"></div>
      <div id="dd-panel"   class="panel"></div>
      <div id="blk-panel"  class="panel"></div>
      <div id="srch-panel" class="panel">
        <div id="srch-out"><p class="srch-hint">Type a query above.</p></div>
      </div>
    </div>
  </div>
</div>

<!-- File content viewer panel -->
<div id="file-viewer">
  <div id="file-viewer-hdr">
    <span id="file-viewer-title"></span>
    <button type="button" id="file-viewer-close" onclick="closeFileViewer()">✕</button>
  </div>
  <div id="file-viewer-body"></div>
</div>

<script src="moonshot-config.js" onerror="void 0"></script>
<script type="module">
import init, { parse_index, search_index } from './pkg/moon_wasm.js';
await init();
window._wasm = { parse_index, search_index };

let G = { bytes: null, parsed: null, sc: null };

// ── Drag-to-resize + click-to-collapse for hex pane divider ──────────────────
(function() {
  const left   = document.getElementById('left');
  const toggle = document.getElementById('hex-toggle');
  let dragging = false, startX = 0, startW = 0, savedW = 480;

  toggle.addEventListener('mousedown', e => {
    if (left.classList.contains('collapsed')) return;
    dragging = true;
    startX   = e.clientX;
    startW   = left.getBoundingClientRect().width;
    document.body.style.cursor     = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const newW = Math.max(120, Math.min(900, startW + e.clientX - startX));
    left.style.width = newW + 'px';
    savedW = newW;
  });

  document.addEventListener('mouseup', e => {
    if (!dragging) return;
    const moved = Math.abs(e.clientX - startX);
    dragging = false;
    document.body.style.cursor     = '';
    document.body.style.userSelect = '';
    if (moved < 4) toggleHex();
  });

  window.toggleHex = function() {
    const col = left.classList.toggle('collapsed');
    left.style.width = col ? '' : savedW + 'px';
  };
})();

// ── Auto-load: from serve.py config OR ?idx=URL param ────────────────────────
(function() {
  const p = new URLSearchParams(window.location.search);
  const u = p.get('idx') || (typeof window.MOONSHOT_IDX === 'string' && window.MOONSHOT_IDX) || '';
  if (u) {
    setStatus('Loading ' + u + '…');
    fetch(u).then(r => r.ok ? r.arrayBuffer() : Promise.reject(r.status))
      .then(buf => loadData(new Uint8Array(buf), u.split('/').pop()))
      .catch(e => setStatus('Cannot load ' + u + ': ' + e));
  }
})();

// ── loading ───────────────────────────────────────────────────────────────────
function loadFile(file) {
  const r = new FileReader();
  r.onload = e => { loadData(new Uint8Array(e.target.result), file.name); };
  r.readAsArrayBuffer(file);
}

function loadData(bytes, name) {
  G.bytes = bytes;
  setStatus('Parsing ' + (name||'file') + '…');
  try {
    G.parsed = JSON.parse(window._wasm.parse_index(G.bytes));
    if (G.parsed.error) { setStatus('Error: '+G.parsed.error); return; }
    G.termHeaderBlocksById = new Map((G.parsed.term_header_table?.blocks || []).map(b => [b.id, b]));
    G_ExpandedTree = new Set();
    G_SelectedTreeNode = '';
    document.getElementById('drop').style.display = 'none';
    document.getElementById('main').style.display = 'flex';
    buildHex();
    renderHeader(); renderTermHeaders(); renderDocData(); renderBlocks();
    setStatus(G.parsed.header.num_docs + ' docs · ' + G.parsed.header.num_terms + ' terms · ' + G.parsed.blocks.length + ' posting blocks');
  } catch(ex) { setStatus('Error: '+ex); console.error(ex); }
}

// Paths are now stored in DocData — no separate .meta file needed

document.getElementById('file-input').onchange = e => { if(e.target.files[0]) loadFile(e.target.files[0]); };

document.body.ondragover = e => e.preventDefault();
document.body.ondrop     = e => { e.preventDefault(); if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); };

// ── build full hex view ───────────────────────────────────────────────────────
// Renders ALL bytes from offset 0 to end. Called once per file.
// Each byte is a <span class="hb"> so we can highlight arbitrary ranges.
// ── Virtual-scroll hex view ───────────────────────────────────────────────────
// Only renders the visible rows (~100) instead of all 57 000+ spans.
const HEX_COLS = 16;
const HEX_RH   = 18;   // row height px — must match line-height in CSS
const HEX_BUF  = 50;   // extra rows rendered above/below viewport
const HEX_CLS  = ['','s-hdr','s-si','s-dd','s-b0','s-b1','s-b2','s-b3'];

let G_HL = { s:-1, e:-1 };   // current highlight range (replaces spanByOff)
let G_ExpandedTree = new Set();
let G_SelectedTreeNode = '';

function buildHex() {
  const data = G.bytes;
  const h    = G.parsed.header;

  // Per-byte section colour (computed once, stored on G)
  const sc = new Uint8Array(data.length);
  for (let i=0; i<Math.min(80,data.length); i++) sc[i]=1;
  for (let i=h.subindex_off; i<h.subindex_off+h.subindex_size && i<data.length; i++) sc[i]=2;
  for (let i=h.docdata_off;  i<h.docdata_off +h.docdata_size  && i<data.length; i++) sc[i]=3;
  for (let b=0; b<G.parsed.blocks.length; b++) {
    const s=h.blocks_off+b*4096, e=s+4096, c=4+(b%4);
    for (let i=s; i<e && i<data.length; i++) sc[i]=c;
  }
  G.sc = sc;
  G_HL = { s:-1, e:-1 };

  const totalRows = Math.ceil(data.length / HEX_COLS);
  const body = document.getElementById('hex-body');
  body.innerHTML =
    `<div id="hex-spacer" style="height:${totalRows*HEX_RH}px;pointer-events:none"></div>` +
    `<div id="hex-vp" style="position:absolute;top:0;left:0;right:0"></div>`;
  body.style.position = 'relative';

  body.addEventListener('scroll', () => {
    renderVP(Math.floor(body.scrollTop / HEX_RH));
  });
  renderVP(0);
}

function renderVP(firstVis) {
  const body = document.getElementById('hex-body');
  const vp   = document.getElementById('hex-vp');
  if (!vp || !G.bytes || !G.sc) return;

  const data  = G.bytes;
  const sc    = G.sc;
  const total = Math.ceil(data.length / HEX_COLS);
  const vis   = Math.ceil((body.clientHeight || 600) / HEX_RH);
  const start = Math.max(0, firstVis - HEX_BUF);
  const end   = Math.min(total, firstVis + vis + HEX_BUF);

  const parts = [];
  for (let row=start; row<end; row++) {
    const base   = row * HEX_COLS;
    const rowEnd = Math.min(base + HEX_COLS, data.length);
    let hex='', asc='';

    for (let j=base; j<rowEnd; j++) {
      const b  = data[j];
      const cl = HEX_CLS[sc[j]] || '';
      const hl = (j>=G_HL.s && j<G_HL.e) ? ' hl' : '';
      hex += `<span class="hb ${cl}${hl}" data-o="${j}">${b.toString(16).padStart(2,'0')}</span>`;
      if (j%16===7) hex += '<span class="gap"> </span>';
      asc += `<span class="hac${hl}" data-o="${j}">${b>=32&&b<127?String.fromCharCode(b):'.'}</span>`;
    }
    for (let j=rowEnd; j<base+HEX_COLS; j++) {
      hex += '<span class="hb" style="visibility:hidden">00</span>';
      if (j%16===7) hex += '<span class="gap"> </span>';
    }

    parts.push(
      `<div class="hrow" style="height:${HEX_RH}px" data-r="${base}">` +
      `<span class="haddr">${base.toString(16).padStart(6,'0')}&nbsp;&nbsp;</span>` +
      `<span class="hbytes">${hex}</span>` +
      `<span class="hascii">${asc}</span></div>`
    );
  }

  vp.style.top  = (start * HEX_RH) + 'px';
  vp.innerHTML  = parts.join('');
}

// ── highlight + scroll ────────────────────────────────────────────────────────
function gotoRange(start, end) {
  G_HL.s = Math.max(0, start|0);
  G_HL.e = Math.min((end|0), G.bytes.length);

  // Scroll so the highlighted region is near the top third of the viewport
  const body = document.getElementById('hex-body');
  if (!body) return;
  const row     = Math.floor(G_HL.s / HEX_COLS);
  const viewH   = body.clientHeight || 600;
  body.scrollTop = Math.max(0, row * HEX_RH - viewH / 3);

  renderVP(Math.floor(body.scrollTop / HEX_RH));
}
window.gotoRange = gotoRange;
window.selectTreeNode = selectTreeNode;
window.toggleTreeNode = toggleTreeNode;

function gotoBlock(seq) {
  const h = G.parsed.header;
  gotoRange(h.blocks_off + seq*4096, h.blocks_off + (seq+1)*4096);
  switchTabByName('blk-panel');
  const card = document.getElementById('bc'+seq);
  if (card) { card.classList.add('open'); card.scrollIntoView({behavior:'smooth',block:'start'}); }
}
function toggleBlock(seq) {
  const h    = G.parsed.header;
  const card = document.getElementById('bc'+seq);
  if (!card) return;
  const opening = !card.classList.contains('open');
  card.classList.toggle('open');
  if (opening) gotoRange(h.blocks_off + seq*4096, h.blocks_off + (seq+1)*4096);
}
window.gotoBlock   = gotoBlock;
window.toggleBlock = toggleBlock;

// ── decoded panels ────────────────────────────────────────────────────────────
function renderHeader() {
  const h = G.parsed.header;
  const fields = [
    ['Magic',        'MOONSHOT',                                       0,  8 ],
    ['Version',      h.version,                                        8,  4 ],
    ['Num docs',     h.num_docs,                                      16,  8 ],
    ['Num terms',    h.num_terms,                                     24,  8 ],
    ['TermHeaderTable off', `0x${h.subindex_off.toString(16)} (${h.subindex_size} B)`, 32, 16],
    ['PageSkip off', `0x${h.pageskip_off.toString(16)} (${h.pageskip_size} B)`, 48, 16],
    ['DocData off',  `0x${h.docdata_off.toString(16)}  (${h.docdata_size} B)`,  64, 16],
    ['PostingBlocks off', `0x${h.blocks_off.toString(16)}`,           80,  8 ],
    ['Num posting blocks', h.num_blocks,                              88,  8 ],
    ['File size',    h.file_size+' B',                                -1, -1 ],
  ];
  let html = '<table><tr><th>Field</th><th>Value</th><th>Offset</th></tr>';
  for (const [n,v,off,len] of fields) {
    const cl = off>=0 ? `onclick="gotoRange(${off},${off+len})"` : '';
    html += `<tr ${cl}><td>${n}</td><td class="mono num">${v}</td>` +
            `<td class="num">${off>=0?'0x'+off.toString(16):'—'}</td></tr>`;
  }
  document.getElementById('hdr-panel').innerHTML = html+'</table>';
}

function renderTermHeaders() {
  const si = G.parsed.term_header_table;
  const h = G.parsed.header;

  let html = '<div class="term-explorer">';
  html += `<div class="term-toolbar">`
       + `TermHeaderTable @ 0x${h.subindex_off.toString(16)} (${h.subindex_size} bytes). `
       + `Use + to expand physical layout nodes; click any row to highlight its on-disk bytes.</div>`;
  html += '<table><tr><th></th><th>Object</th><th>Disk bytes</th><th>Target / fields</th><th>Posting</th></tr>';
  html += renderTreeRoot(h, si);
  html += '</table></div>';
  document.getElementById('si-panel').innerHTML = html;
}

function renderTreeRoot(h, si) {
  const node = 'table';
  const expanded = G_ExpandedTree.has(node);
  const active = G_SelectedTreeNode === node ? ' active' : '';
  let html = `<tr class="tree-row${active}" onclick="selectTreeNode('${node}',${h.subindex_off},${h.subindex_off + h.subindex_size})">`
       + `<td><button type="button" class="icon-btn" onclick="event.stopPropagation();toggleTreeNode('${node}')">${expanded ? '-' : '+'}</button></td>`
       + `<td><span class="tree-kind">section</span> <span class="key mono">TermHeaderTable</span></td>`
       + `<td class="num">0x${h.subindex_off.toString(16)} +${h.subindex_size}</td>`
       + `<td>${si.dir.length} DirectoryEntry rows, ${(si.blocks || []).length} TermHeaderBlocks</td>`
       + `<td></td></tr>`;

  if (expanded) {
    for (const d of si.dir) html += renderDirectoryEntry(d);
  }
  return html;
}

function renderDirectoryEntry(d) {
  const node = `dir:${d.term_header_block_id}`;
  const expanded = G_ExpandedTree.has(node);
  const active = G_SelectedTreeNode === node ? ' active' : '';
  let html = `<tr class="tree-row${active}" onclick="selectTreeNode('${node}',${d.byte_offset},${d.byte_offset + d.byte_len})">`
       + `<td><span class="indent"></span><button type="button" class="icon-btn" onclick="event.stopPropagation();toggleTreeNode('${node}')">${expanded ? '-' : '+'}</button></td>`
       + `<td><span class="tree-kind">DirectoryEntry</span> <span class="key mono">${esc(d.first_term)}</span></td>`
       + `<td class="num">0x${d.byte_offset.toString(16)} +${d.byte_len}</td>`
       + `<td>points to TermHeaderBlock[${d.term_header_block_id}] @ 0x${d.header_block_offset.toString(16)} +${d.header_block_len}</td>`
       + `<td></td></tr>`;

  if (expanded) html += renderHeaderBlock(d.term_header_block_id, 2);
  return html;
}

function renderHeaderBlock(block_idx, depth) {
  const block = G.termHeaderBlocksById?.get(block_idx);
  if (!block) return '';
  const node = `thb:${block_idx}`;
  const expanded = G_ExpandedTree.has(node);
  const active = G_SelectedTreeNode === node ? ' active' : '';
  const indent = '<span class="indent"></span>'.repeat(depth);
  let html = `<tr class="tree-row${active}" onclick="selectTreeNode('${node}',${block.byte_offset},${block.byte_offset + block.byte_len})">`
       + `<td>${indent}<button type="button" class="icon-btn" onclick="event.stopPropagation();toggleTreeNode('${node}')">${expanded ? '-' : '+'}</button></td>`
       + `<td><span class="tree-kind">TermHeaderBlock</span> <span class="num">${block_idx}</span></td>`
       + `<td class="num">0x${block.byte_offset.toString(16)} +${block.byte_len}</td>`
       + `<td>${block.headers.length} TermHeader records</td>`
       + `<td></td></tr>`;

  if (expanded) {
    for (let i=0; i<block.headers.length; i++) html += renderTermHeader(block_idx, i, block.headers[i], depth + 1);
  }
  return html;
}

function renderTermHeader(block_idx, header_idx, e, depth) {
  const h = G.parsed.header;
  const node = `term:${block_idx}:${header_idx}`;
  const active = G_SelectedTreeNode === node ? ' active' : '';
  const postingStart = h.blocks_off + e.posting_block_id * 4096 + 208 + e.posting_offset;
  const postingEnd = postingStart + e.posting_length;
  const indent = '<span class="indent"></span>'.repeat(depth);
  return `<tr class="tree-row${active}" onclick="selectTreeNode('${node}',${e.byte_offset},${e.byte_offset + e.byte_len})">`
       + `<td>${indent}<button type="button" class="icon-btn" title="Toggle posting detail" onclick="event.stopPropagation();toggleTreeNode('${node}')">${G_ExpandedTree.has(node) ? '-' : '+'}</button></td>`
       + `<td><span class="tree-kind">TermHeader</span> <span class="key mono">${esc(e.term)}</span></td>`
       + `<td class="num">0x${e.byte_offset.toString(16)} +${e.byte_len}</td>`
       + `<td>df=<span class="num">${e.doc_freq}</span> skip=<span class="num">${e.skip_list_offset}</span> cont=<span class="num">${e.continuation_block_count}</span> flags=<span class="num">${e.flags}</span></td>`
       + `<td>PostingBlock[${e.posting_block_id}] 0x${postingStart.toString(16)} +${e.posting_length}</td></tr>`
       + (G_ExpandedTree.has(node) ? renderPostingInline(node, e, depth + 1, postingStart, postingEnd) : '');
}

function renderPostingInline(node, e, depth, postingStart, postingEnd) {
  const indent = '<span class="indent"></span>'.repeat(depth);
  const block = (G.parsed.blocks || []).find(b => b.seq === e.posting_block_id);
  const term = block ? (block.terms || []).find(t => t.key === e.term && t.data_off === e.posting_offset) : null;
  let posts = '';
  if (term && term.postings && term.postings.length) {
    posts = term.postings.map(p => {
      const fp = G.pathOf(p.doc_id);
      return `<div class="posting">doc=${p.doc_id} tf=${p.tf}${fp?' <span class="path">'+esc(fp)+'</span>':''}</div>`;
    }).join('');
  } else {
    posts = '<div class="posting" style="color:#888">No decoded sample postings in parser output.</div>';
  }
  return `<tr class="tree-row${G_SelectedTreeNode === node + ':posting' ? ' active' : ''}" onclick="selectTreeNode('${node}:posting',${postingStart},${postingEnd})">`
       + `<td>${indent}</td>`
       + `<td><span class="tree-kind">Posting bytes</span> <span class="key mono">${esc(e.term)}</span></td>`
       + `<td class="num">0x${postingStart.toString(16)} +${e.posting_length}</td>`
       + `<td>PostingBlock[${e.posting_block_id}] offset=<span class="num">${e.posting_offset}</span> length=<span class="num">${e.posting_length}</span></td>`
       + `<td>${posts}</td></tr>`;
}

function selectTreeNode(node, start, end) {
  G_SelectedTreeNode = node;
  gotoRange(start, end);
  document.querySelectorAll('.tree-row').forEach(r => r.classList.remove('active'));
  renderTermHeadersPreserveScroll();
}

function toggleTreeNode(node) {
  const panel = document.getElementById('si-panel');
  const scrollTop = panel ? panel.scrollTop : 0;
  if (G_ExpandedTree.has(node)) {
    collapseTreeSubtree(node);
  } else {
    G_ExpandedTree.add(node);
  }
  renderTermHeaders();
  if (panel) panel.scrollTop = scrollTop;
}

function collapseTreeSubtree(node) {
  G_ExpandedTree.delete(node);

  if (node === 'table') {
    G_ExpandedTree.clear();
    G_SelectedTreeNode = '';
  } else if (node.startsWith('dir:')) {
    const blockId = node.slice(4);
    for (const key of Array.from(G_ExpandedTree)) {
      if (key === `thb:${blockId}` || key.startsWith(`term:${blockId}:`))
        G_ExpandedTree.delete(key);
    }
    if (G_SelectedTreeNode === `thb:${blockId}` || G_SelectedTreeNode.startsWith(`term:${blockId}:`))
      G_SelectedTreeNode = '';
  } else if (node.startsWith('thb:')) {
    const blockId = node.slice(4);
    for (const key of Array.from(G_ExpandedTree)) {
      if (key.startsWith(`term:${blockId}:`))
        G_ExpandedTree.delete(key);
    }
    if (G_SelectedTreeNode.startsWith(`term:${blockId}:`))
      G_SelectedTreeNode = '';
  }

  if (G_SelectedTreeNode === node || G_SelectedTreeNode.startsWith(node + ':'))
    G_SelectedTreeNode = '';
}

function renderTermHeadersPreserveScroll() {
  const panel = document.getElementById('si-panel');
  const scrollTop = panel ? panel.scrollTop : 0;
  renderTermHeaders();
  const next = document.getElementById('si-panel');
  if (next) next.scrollTop = scrollTop;
}

function renderDocData() {
  const h = G.parsed.header;
  let html = '<table><tr><th>id</th><th>importance</th><th>doc_len</th><th>path</th></tr>';
  for (const [i,d] of G.parsed.docdata.entries()) {
    const off = h.docdata_off + i*256;  // 256B DocRec
    const fp  = d.path || '';
    const link = fp ? `<span class="spath" onclick="openFile('${esc(fp)}')" title="Open file">${esc(fp)}</span>`
                    : '<span style="color:#555">—</span>';
    html += `<tr onclick="gotoRange(${off},${off+256})">` +
            `<td class="mono num" style="font-size:10px">${d.doc_id}</td>` +
            `<td class="num">${d.importance}</td><td class="num">${d.doc_len}</td>` +
            `<td>${link}</td></tr>`;
  }
  document.getElementById('dd-panel').innerHTML = html+'</table>';
}

function renderBlocks() {
  const h = G.parsed.header;
  let html = '';
  for (const blk of G.parsed.blocks) {
    const blkOff = h.blocks_off + blk.seq*4096;
    let badges = '';
    if (blk.has_more)        badges += `<span class="badge badge-more">HAS_MORE</span>`;
    if (blk.is_continuation) badges += `<span class="badge badge-cont">continuation</span>`;

    html += `<div class="bcard" id="bc${blk.seq}">` +
            `<div class="bcard-hdr" onclick="toggleBlock(${blk.seq})">` +
            `<span class="key">PostingBlock</span> <span class="num">${blk.seq}</span>${badges}` +
            `<span style="color:#555;font-size:11px;margin-left:auto">` +
            `0x${blkOff.toString(16)}</span></div>` +
            `<div class="bcard-body" id="bb${blk.seq}">`;

    if (blk.terms.length > 0) {
      if (blk.is_continuation)
        html += `<div style="color:#5c8a3a;padding:4px 8px;font-size:11px">↳ continuation data + new terms below</div>`;
      html += '<table><tr><th>Term</th><th>freq</th><th>Postings</th></tr>';
      for (const t of blk.terms) {
        const termStart = blkOff + 208 + t.data_off;
        const termEnd   = blkOff + 208 + t.data_off + t.data_len;
        let posts='';
        for (const p of t.postings) {
          const fp=G.pathOf(p.doc_id);
          posts+=`<div class="posting">id=${p.doc_id} tf=${p.tf}${fp?' <span class="path">'+esc(fp)+'</span>':''}</div>`;
        }
        html += `<tr class="term-entry" data-term="${esc(t.key)}"` +
                ` onclick="gotoRange(${termStart},${termEnd})">` +
                `<td class="key mono">${esc(t.key)}` +
                `${t.continuation_block_count>0?'<span class="badge badge-more">→cont</span>':''}</td>` +
                `<td class="num">${t.freq}</td><td>${posts}</td></tr>`;
      }
      html += '</table>';
    } else if (blk.is_continuation) {
      html += `<div style="color:#888;padding:8px;font-size:11px">Continuation — raw posting bytes only, no new terms</div>`;
    }
    html += '</div></div>';
  }
  document.getElementById('blk-panel').innerHTML = html;
}

// ── search ────────────────────────────────────────────────────────────────────
window.onSearch = function(q) {
  if (!G.bytes) return;
  document.querySelectorAll('.term-entry').forEach(r => {
    r.style.display = (!q || (r.dataset.term||'').toLowerCase().includes(q.toLowerCase())) ? '' : 'none';
  });
  if (q.length>2) {
    try {
      const res=JSON.parse(window._wasm.search_index(G.bytes,q,'AUTB'));
      if (Array.isArray(res)&&res.length>0) {
        let html=`<h3 style="padding:8px;color:#9cdcfe;font-size:12px">Results for "${esc(q)}"</h3>`;
        for (const r of res) {
          const fp=G.pathOf(r.doc_id)||r.doc_id;
          html+=`<div class="sres"><span class="score">${r.score.toFixed(3)}</span><span class="spath" onclick="openFile('${esc(fp)}')" title="Click to open">${esc(fp)}</span></div>`;
        }
        document.getElementById('srch-out').innerHTML=html;
        switchTabByName('srch-panel'); return;
      }
    } catch(e){}
  }
  if (q.length>0) switchTabByName('blk-panel');
};

function switchTab(el) {
  document.querySelectorAll('.dtab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(el.dataset.p).classList.add('active');
  if (el.dataset.p === 'si-panel' && G.parsed) {
    const h = G.parsed.header;
    gotoRange(h.subindex_off, h.subindex_off + h.subindex_size);
  }
}
function switchTabByName(id) {
  document.querySelectorAll('.dtab').forEach(t=>t.classList.toggle('active',t.dataset.p===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id===id));
}
window.switchTab=switchTab;
window.switchTabByName=switchTabByName;

function setStatus(s){ document.getElementById('status').textContent=s; }

// Path helper — looks up file path from DocData by doc_id string
G.pathOf = function(docId) {
  if (!G.parsed) return '';
  const s = String(docId);
  const d = G.parsed.docdata.find(d => String(d.doc_id) === s);
  return d ? (d.path||'') : '';
};

// File viewer
window.openFile = function(path) {
  if (!path) return;
  const v = document.getElementById('file-viewer');
  document.getElementById('file-viewer-title').textContent = path;
  document.getElementById('file-viewer-body').textContent = 'Loading…';
  v.style.display = 'flex';
  // Try relative path first, then as-is
  const url = path.startsWith('/') || path.match(/^[A-Za-z]:/) ? null : path;
  fetch(url || path)
    .then(r => r.ok ? r.text() : Promise.reject(r.status))
    .then(t => { document.getElementById('file-viewer-body').textContent = t; })
    .catch(() => { document.getElementById('file-viewer-body').textContent =
      `Cannot fetch file via HTTP.\nPath: ${path}\n\nTip: start the HTTP server from the directory containing the indexed files.`; });
};
window.closeFileViewer = function() {
  document.getElementById('file-viewer').style.display = 'none';
};
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
